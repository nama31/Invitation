services:
  postgres:
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed externally — only internal network

  backend:
    restart: always
    # No volume mount (no hot reload)
    # Run: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    # Set CORS to only allow the production domain

  frontend:
    restart: always
    # Build the Next.js app and start in production mode
    command: sh -c "npm run build && npm start"
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
