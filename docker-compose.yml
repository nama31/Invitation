services:
  # -----------------------------------------------------------------------
  # PostgreSQL 16
  # -----------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: eventinvite_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventinvite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-eventinvite}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eventinvite}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------
  # FastAPI Backend
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventinvite_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://eventinvite:secret@postgres:5432/eventinvite}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app           # hot-reload mount
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --reload
      --host 0.0.0.0
      --port 8000

  # -----------------------------------------------------------------------
  # Next.js Frontend
  # -----------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventinvite_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app          # hot-reload mount
      - /app/node_modules        # prevent host node_modules overriding container
      - /app/.next               # preserve build cache
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
